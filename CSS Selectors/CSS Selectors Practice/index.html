<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Document</title>

    <style>
        h1 {
            color: red;
        }
        p{
            color: green;
            font-size: 20px;
        }

        .highlight{
            background-color: yellow;
            color: white;
        }

        #mainTitle{
            color: purple;
            font-size: 40px;
        }

        /* i added this to style the div */
        div{
            background-color: aliceblue;
            border: 1px solid;
            width: 1000px;
            height: auto;
        }
        div p{
            color: orange;
        }
    </style>
</head>
<body>
    <h1 id="mainTitle">My Website.</h1>


    <p>This is paragraph 1</p>

    <p class="highlight">This is paragraph 2</p>

    <p class="highlight">This is paragraph 3</p>

    <br>

    <div>
        <p>This is paragraph inside &lt;div&gt;</p>
        <p>This is another paragarph inside &lt;div&gt;</p>
    </div>

    <p>This is paragraph outside &lt;div&gt;</p>
</body>
</html>
