<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Elements Example</title>

    <style>
        /* تغيير أول سطر */
        p::first-line {
            font-weight: bold;
            color: red;
        }

        a{
            background-color: gray;
            color: white;
        }
        a:hover{
            background-color: red;
           
        }

        /* إضافة نجمة قبل الفقرة */
        p::before {
            content: "⭐ "; /* نجمة مع مسافة */
        }
    </style>
</head>
<body>
    <p>This is a paragraph demonstrating pseudo elements in CSS. The first line is bold and red, and a star is added before the text.</p>

    <p>This is text 2</p>

    <a style="color: blue;" href="#">click me</a>
</body>
</html>
